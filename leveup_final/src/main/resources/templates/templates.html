<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta charset="utf-8" />
  <title>Select Plan</title>
  <link rel="stylesheet" href="/css/globals.css">
  <style>
    body {
      margin: 0;
      background-color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .nav-header {
        position: fixed;
        top: 0; left: 0; right: 0; height: 100px; z-index: 100;
        display: flex; align-items: flex-end; justify-content: space-between;
        padding: 0 12px 15px 12px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        box-sizing: border-box;
    }

    .action-icon {
        width: 40px; height: 40px; background: #f5f5f5;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        text-decoration: none;
    }

    .nav-title {
        font-size: 28px; font-weight: 800; color: #000; margin: 0; text-align: center;
    }

    .page-container {
        padding: 120px 12px 120px 12px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    /* 每个模板卡片：一行一个 */
    .template-card {
        position: relative;
        width: 100%;
        height: 140px;
        border-radius: 24px;
        overflow: hidden;
    }

    .card-bg {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background-size: cover; background-position: center;
    }

    .card-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.2) 100%);
    }

    /* 文字区域靠左 */
    .card-text {
        position: absolute;
        top: 20px; left: 20px;
        z-index: 2;
    }

    .card-title {
        font-size: 20px;
        font-weight: 700;
        color: #FFFFFF;
        margin: 0 0 4px 0;
        text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    .card-subtitle {
        font-size: 13px;
        font-weight: 400;
        color: rgba(255,255,255,0.85);
        margin: 0;
    }

    /* Start按钮靠右下 */
    .btn-start {
        position: absolute;
        bottom: 16px; right: 16px;
        z-index: 2;
        background: rgba(255,255,255,0.95);
        color: #007AFF;
        border: none;
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .fixed-tabbar {
        position: fixed; bottom: 0; left: 0; right: 0; height: 83px; z-index: 9999;
        background: #FFFFFF; display: flex; justify-content: space-around;
        align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        border-top-left-radius: 24px; border-top-right-radius: 24px;
        padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 50px; height: 50px; text-decoration: none; }
    .tab-icon { width: 28px; height: 28px; background-color: #828282; -webkit-mask-size: contain; mask-size: contain; mask-repeat: no-repeat; display: block; }
  </style>
</head>

<body>

  <header class="nav-header">
      <a th:href="@{/home}" class="action-icon">
          <img src="/img/fi-arrow-left.svg" alt="Back" width="20" height="20" />
      </a>
      <h1 class="nav-title">Select Plan</h1>
      <div style="width: 40px;"></div>
  </header>

  <main class="page-container">

    <!-- Chest -->
    <div class="template-card">
      <div class="card-bg" style="background-image: url('/img/template/chest/97dd3a9d28a9018c94b6f1d8cd2c226.png');"></div>
      <div class="card-overlay"></div>
      <div class="card-text">
        <p class="card-title">Chest Power</p>
        <p class="card-subtitle">Goal: Chest</p>
      </div>
      <form th:action="@{/workouts/generate-preview}" method="post">
        <input type="hidden" name="templateId" th:value="1">
        <button type="submit" class="btn-start">Start</button>
      </form>
    </div>

    <!-- Back -->
    <div class="template-card">
      <div class="card-bg" style="background-image: url('/img/template/back/6761378d5f1d0a292f98a9812bef35f.png');"></div>
      <div class="card-overlay"></div>
      <div class="card-text">
        <p class="card-title">Back Builder</p>
        <p class="card-subtitle">Goal: Back</p>
      </div>
      <form th:action="@{/workouts/generate-preview}" method="post">
        <input type="hidden" name="templateId" th:value="2">
        <button type="submit" class="btn-start">Start</button>
      </form>
    </div>

    <!-- Shoulders -->
    <div class="template-card">
      <div class="card-bg" style="background-image: url('/img/template/shoulders/983e85d270fc2de11c40ccf1aba3f71.png');"></div>
      <div class="card-overlay"></div>
      <div class="card-text">
        <p class="card-title">Shoulder Strength</p>
        <p class="card-subtitle">Goal: Shoulders</p>
      </div>
      <form th:action="@{/workouts/generate-preview}" method="post">
        <input type="hidden" name="templateId" th:value="3">
        <button type="submit" class="btn-start">Start</button>
      </form>
    </div>

    <!-- Legs -->
    <div class="template-card">
      <div class="card-bg" style="background-image: url('/img/template/legs/9d217608bd993472b3ad543a4769cae.png');"></div>
      <div class="card-overlay"></div>
      <div class="card-text">
        <p class="card-title">Leg Day</p>
        <p class="card-subtitle">Goal: Legs</p>
      </div>
      <form th:action="@{/workouts/generate-preview}" method="post">
        <input type="hidden" name="templateId" th:value="4">
        <button type="submit" class="btn-start">Start</button>
      </form>
    </div>

    <!-- Arms -->
    <div class="template-card">
      <div class="card-bg" style="background-image: url('/img/template/arms/192776446528506b76731526b372104.png');"></div>
      <div class="card-overlay"></div>
      <div class="card-text">
        <p class="card-title">Arm Attack</p>
        <p class="card-subtitle">Goal: Arms</p>
      </div>
      <form th:action="@{/workouts/generate-preview}" method="post">
        <input type="hidden" name="templateId" th:value="5">
        <button type="submit" class="btn-start">Start</button>
      </form>
    </div>

    <!-- Core -->
    <div class="template-card">
      <div class="card-bg" style="background-image: url('/img/template/core/8abddd5d6bf3c9e0c3d87b3e6364d83.png');"></div>
      <div class="card-overlay"></div>
      <div class="card-text">
        <p class="card-title">Core Crusher</p>
        <p class="card-subtitle">Goal: Core</p>
      </div>
      <form th:action="@{/workouts/generate-preview}" method="post">
        <input type="hidden" name="templateId" th:value="6">
        <button type="submit" class="btn-start">Start</button>
      </form>
    </div>

  </main>

  <nav class="fixed-tabbar">
    <a th:href="@{/home}" class="tab-item">
        <div class="tab-icon" style="-webkit-mask-image: url('/img/home.svg'); mask-image: url('/img/home.svg');"></div>
    </a>
    <a th:href="@{/explore}" class="tab-item">
        <div class="tab-icon" style="-webkit-mask-image: url('/img/explore.svg'); mask-image: url('/img/explore.svg');"></div>
    </a>
    <a th:href="@{/person}" class="tab-item">
        <div class="tab-icon" style="-webkit-mask-image: url('/img/profile.svg'); mask-image: url('/img/profile.svg');"></div>
    </a>
  </nav>

</body>
</html>
