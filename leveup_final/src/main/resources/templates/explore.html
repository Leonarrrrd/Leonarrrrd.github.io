<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta charset="utf-8" />
  <title>Explore</title>
  <link rel="stylesheet" href="/css/globals.css">
  <link rel="stylesheet" href="/css/styleguide.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background-color: #f5f6f8;
      font-family: var(--body-default-font-family, sans-serif);
    }

    .explore-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .content-area {
      flex: 1;
      display: flex;
    }

    .parts-sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 83px;
      width: 80px;
      background: #f5f6f8;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      z-index: 100;
    }

    .right-panel {
      flex: 1;
      margin-left: 80px;
      background: #f5f6f8;
      padding: 16px;
      padding-bottom: 100px;
    }

    .panel-title {
      position: sticky;
      top: 0;
      background: #f5f6f8;
      z-index: 10;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
      color: #333;
      padding-top: 44px;
    }

    .part-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      font-size: 15px;
      color: #333;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      user-select: none;
    }

    .part-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 2px;
      bottom: 2px;
      width: 3px;
      background: #007aff;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .part-item.active {
      color: #007aff;
      font-weight: bold;
    }

    .part-item.active::before {
      opacity: 1;
    }

    .part-item .arrow {
      margin-left: auto;
      font-size: 10px;
      transition: transform 0.2s;
    }

    .part-item.open .arrow {
      transform: rotate(90deg);
    }

    .sub-parts {
      display: none;
      flex-direction: column;
      background: #f8f9fa;
      padding-left: 10px;
    }

    .sub-parts.open {
      display: flex;
    }

    .sub-part-item {
      padding: 6px 10px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      transition: color 0.2s;
    }

    .sub-part-item:hover,
    .sub-part-item.active {
      color: #007aff;
      font-weight: bold;
    }

    .panel-hint {
      font-size: 13px;
      color: #9e9e9e;
      text-align: center;
      margin-top: 40px;
    }

    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .exercise-card {
      background: #fff;
      border-radius: 12px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .exercise-card .exercise-gif {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      background: #f0f0f0;
    }

    .exercise-card .exercise-name {
      font-size: 11px;
      color: #333;
      text-align: center;
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 83px;
      background-color: #FFFFFF;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      z-index: 100;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      text-decoration: none;
      color: #828282;
    }

    .tab-item.active {
      color: #000000;
    }

    .tab-icon {
      width: 28px;
      height: 28px;
      background-color: currentColor;
      mask-size: contain;
      -webkit-mask-size: contain;
      mask-repeat: no-repeat;
      -webkit-mask-repeat: no-repeat;
      mask-position: center;
      -webkit-mask-position: center;
    }
  </style>
</head>
<body>

<main class="explore-page">
  <div class="content-area">
    <div class="parts-sidebar">
      <!-- Chest -->
      <div class="part-item" data-part="chest">
        Chest
        <span class="arrow">&#8250;</span>
      </div>
      <div class="sub-parts" id="sub-chest">
        <div class="sub-part-item" data-sub="upper-chest">Upper</div>
        <div class="sub-part-item" data-sub="middle-chest">Middle</div>
        <div class="sub-part-item" data-sub="lower-chest">Lower</div>
      </div>

      <!-- Back -->
      <div class="part-item" data-part="back">
        Back
        <span class="arrow">&#8250;</span>
      </div>
      <div class="sub-parts" id="sub-back">
        <div class="sub-part-item" data-sub="upper-back">Upper</div>
        <div class="sub-part-item" data-sub="lower-back">Lower</div>
      </div>

      <!-- Legs -->
      <div class="part-item" data-part="legs">
        Legs
        <span class="arrow">&#8250;</span>
      </div>
      <div class="sub-parts" id="sub-legs">
        <div class="sub-part-item" data-sub="front-legs">Front</div>
        <div class="sub-part-item" data-sub="side-legs">Side</div>
      </div>

      <!-- Shoulders -->
      <div class="part-item" data-part="shoulders">
        Shoulders
        <span class="arrow">&#8250;</span>
      </div>
      <div class="sub-parts" id="sub-shoulders">
        <div class="sub-part-item" data-sub="front-delt">Front</div>
        <div class="sub-part-item" data-sub="rear-delt">Rear</div>
        <div class="sub-part-item" data-sub="side-delt">Side</div>
        <div class="sub-part-item" data-sub="traps">Traps</div>
      </div>

      <!-- Arms -->
      <div class="part-item" data-part="arms">
        Arms
        <span class="arrow">&#8250;</span>
      </div>
      <div class="sub-parts" id="sub-arms">
        <div class="sub-part-item" data-sub="biceps">Biceps</div>
        <div class="sub-part-item" data-sub="triceps">Triceps</div>
      </div>

      <!-- Abs -->
      <div class="part-item" data-part="abs">
        Abs
        <span class="arrow">&#8250;</span>
      </div>
      <div class="sub-parts" id="sub-abs">
        <div class="sub-part-item" data-sub="upper-abs">Upper</div>
        <div class="sub-part-item" data-sub="lower-abs">Lower</div>
        <div class="sub-part-item" data-sub="side-abs">Side</div>
      </div>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="panel-title" id="panelTitle">Select a Muscle Group</div>
      <div class="panel-hint" id="panelHint">Tap a category on the left to start</div>
      <div class="exercise-grid" id="exerciseGrid" style="display:none;"></div>
    </div>
  </div>

  <nav class="tab-bar">
    <a th:href="@{/home}" class="tab-item">
      <div class="tab-icon" style="mask-image: url('/img/home.svg'); -webkit-mask-image: url('/img/home.svg');"></div>
    </a>

    <a th:href="@{/explore}" class="tab-item active">
      <div class="tab-icon" style="mask-image: url('/img/explore.svg'); -webkit-mask-image: url('/img/explore.svg');"></div>
    </a>

    <a th:href="@{/person}" class="tab-item">
      <div class="tab-icon" style="mask-image: url('/img/profile.svg'); -webkit-mask-image: url('/img/profile.svg');"></div>
    </a>
  </nav>

</main>

<script>
var currentPart = null;
var currentSub = null;

document.querySelectorAll('.part-item').forEach(function(item) {
  item.addEventListener('click', function() {
    var part = this.dataset.part;
    var subEl = document.getElementById('sub-' + part);

    if (currentPart === part) {
      this.classList.remove('open');
      subEl.classList.remove('open');
      this.classList.remove('active');
      currentPart = null;
      currentSub = null;
      document.getElementById('panelTitle').textContent = 'Select a Muscle Group';
      document.getElementById('panelHint').style.display = 'block';
      document.getElementById('exerciseGrid').style.display = 'none';
      return;
    }

    if (currentPart) {
      var prevSub = document.getElementById('sub-' + currentPart);
      if (prevSub) prevSub.classList.remove('open');
      document.querySelector('[data-part="' + currentPart + '"]').classList.remove('open', 'active');
    }

    document.querySelectorAll('.sub-part-item').forEach(function(s) {
      s.classList.remove('active');
    });

    this.classList.add('open', 'active');
    subEl.classList.add('open');
    currentPart = part;
    currentSub = null;
    document.getElementById('panelTitle').textContent = this.childNodes[0].textContent.trim();
    document.getElementById('panelHint').style.display = 'block';
    document.getElementById('exerciseGrid').style.display = 'none';
  });
});

document.querySelectorAll('.sub-part-item').forEach(function(item) {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    var sub = this.dataset.sub;

    document.querySelectorAll('.sub-part-item').forEach(function(s) {
      s.classList.remove('active');
    });
    this.classList.add('active');
    currentSub = sub;

    var subNames = {
      'upper-chest': 'Upper Chest', 'middle-chest': 'Middle Chest', 'lower-chest': 'Lower Chest',
      'upper-back': 'Upper Back', 'lower-back': 'Lower Back',
      'front-legs': 'Front Legs', 'side-legs': 'Side Legs',
      'front-delt': 'Front Delt', 'rear-delt': 'Rear Delt', 'side-delt': 'Side Delt', 'traps': 'Traps',
      'biceps': 'Biceps', 'triceps': 'Triceps',
      'upper-abs': 'Upper Abs', 'lower-abs': 'Lower Abs', 'side-abs': 'Side Abs'
    };

    document.getElementById('panelTitle').textContent = subNames[sub] || sub;
    document.getElementById('panelHint').style.display = 'none';

    var exercises = exerciseData[sub] || [];
    var grid = document.getElementById('exerciseGrid');
    grid.style.display = 'grid';
    grid.innerHTML = '';

    exercises.forEach(function(ex) {
      var card = document.createElement('div');
      card.className = 'exercise-card';
      card.innerHTML = '<img class="exercise-gif" src="' + ex.gif + '" alt="' + ex.name + '" />' +
                       '<span class="exercise-name">' + ex.name + '</span>';
      grid.appendChild(card);
    });

    if (exercises.length === 0) {
      grid.innerHTML = '<div style="grid-column:span 2;text-align:center;color:#9e9e9e;font-size:13px;padding:40px 0;">No exercises available</div>';
    }
  });
});
