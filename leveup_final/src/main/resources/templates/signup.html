<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta charset="utf-8" />
  <title>Register</title>
  <link rel="stylesheet" href="/css/globals.css">
  <link rel="stylesheet" href="/css/styleguide.css">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background-color: #ffffff;
      font-family: var(--body-default-font-family, sans-serif);
      color: var(--color-neutral-n800, #333);
    }

    .sign-up {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 32px;
    }

    .header-variant {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      padding-top: env(safe-area-inset-top, 44px);
    
    }

    .action-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background-color: var(--color-neutral-n100, #f5f5f5);
      border-radius: 50%;
      text-decoration: none;
      margin-top: 44px;
    }

    .page-title {
      font-family: var(--title-screen-font-family);
      font-size: var(--title-screen-font-size, 24px);
      text-align: center;
      margin: 10px 0 32px 0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-label {
      font-size: var(--body-default-font-size, 14px);
      font-weight: var(--body-default-font-weight, 500);
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background-color: var(--color-shade-white, #fff);
      border-radius: 8px;
      border: 1.5px solid var(--color-neutral-n200, #e0e0e0);
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--variable-collection-apple-blue, #007aff);
    }

    .form-input {
      appearance: none;
      background-color: transparent;
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: var(--body-default-font-size, 14px);
      color: inherit;
      width: 100%;
    }

    .form-input select {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: var(--body-default-font-size, 14px);
      color: inherit;
    }

    .form-input::placeholder {
      color: var(--color-neutral-n400, #9e9e9e);
    }

    .form-input[type="number"]::-webkit-inner-spin-button,
    .form-input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .toggle-password {
      background: none;
      border: none;
      padding: 0;
      margin-left: 8px;
      cursor: pointer;
      display: flex;
    }

    .hint-text {
      font-size: 12px;
      color: var(--color-neutral-n500, #757575);
      margin-top: 4px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .radio-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background-color: var(--color-shade-white, #fff);
      border: 2px solid var(--color-neutral-n200, #e0e0e0);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .radio-card:hover {
      border-color: var(--variable-collection-apple-blue, #007aff);
    }

    .radio-card.selected {
      border-color: var(--variable-collection-apple-blue, #007aff);
      background-color: rgba(0, 122, 255, 0.05);
    }

    .radio-card input[type="radio"] {
      display: none;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--color-neutral-n800, #333);
    }

    .radio-icon {
      font-size: 20px;
    }

    .submit-button {
      background-color: var(--variable-collection-apple-blue, #007aff);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 32px;
      width: 100%;
    }

    .error-message {
      color: #f44336;
      text-align: center;
      font-size: 14px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<main class="sign-up">

  <header class="header-variant">
    <a th:href="@{/}" class="action-icon">
      <img src="/img/fi-arrow-left.svg" alt="Back arrow" width="20" height="20" />
    </a>
   
  </header>
 <h1 class="page-title">Register</h1>
  <div id="errorMessage" class="error-message" th:if="${error}" th:text="${error}" style="display: block;"></div>

  <form th:action="@{/register}" method="post" novalidate>

    <!-- 原有字段：email -->
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <div class="input-wrapper">
        <input class="form-input" id="email" type="email" name="email"
               th:value="${user?.email ?: ''}" placeholder="you@example.com" required />
      </div>
    </div>

    <!-- 原有字段：name + height -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="name">Name</label>
        <div class="input-wrapper">
          <input class="form-input" id="name" type="text" name="name"
                 th:value="${user?.name ?: ''}" placeholder="John Doe" autocomplete="name" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="height">Height</label>
        <div class="input-wrapper">
          <input class="form-input" id="height" type="number" name="height"
                 th:value="${user?.height ?: ''}" min="50" max="250" placeholder="cm" required />
        </div>
      </div>
    </div>

    <!-- 原有字段：gender + weight -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="gender">Gender</label>
        <div class="input-wrapper">
          <select class="form-input" id="gender" name="gender" required>
            <option value="" disabled th:selected="${user?.gender == null}">Man/Woman</option>
            <option value="man" th:selected="${user?.gender == 'man'}">Man</option>
            <option value="woman" th:selected="${user?.gender == 'woman'}">Woman</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="weight">Weight</label>
        <div class="input-wrapper">
          <input class="form-input" id="weight" type="number" name="weight"
                 th:value="${user?.weight ?: ''}" placeholder="kg" required />
        </div>
      </div>
    </div>

    <!-- 新增字段：age -->
    <div class="form-group">
      <label class="form-label" for="age">Age</label>
      <div class="input-wrapper">
        <input class="form-input" id="age" type="number" name="age"
               th:value="${user?.age ?: ''}" min="10" max="100" placeholder="years" required />
      </div>
    </div>

    <!-- 原有字段：password -->
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrapper">
        <input class="form-input" id="password" type="password" name="password" placeholder="*********" minlength="8" autocomplete="new-password" required />
        <button type="button" class="toggle-password" data-target="password">
          <img src="/img/fi-eye-off.svg" alt="Hide password" width="20" height="20" />
        </button>
      </div>
      <span class="hint-text">at least 8 characters</span>
    </div>

    <!-- 原有字段：confirmPassword -->
    <div class="form-group">
      <label class="form-label" for="confirmPassword">Confirm Password</label>
      <div class="input-wrapper">
        <input class="form-input" id="confirmPassword" type="password" name="confirmPassword" placeholder="*********" minlength="8" autocomplete="new-password" required />
        <button type="button" class="toggle-password" data-target="confirmPassword">
          <img src="/img/fi-eye-off.svg" alt="Hide password" width="20" height="20" />
        </button>
      </div>
    </div>

    <button class="submit-button" type="submit">Create Account</button>

  </form>

</main>

<script>
  document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      if (target) {
        target.type = target.type === 'password' ? 'text' : 'password';
      }
    });
  });

  document.querySelectorAll('.radio-group').forEach(group => {
    group.querySelectorAll('.radio-card').forEach(card => {
      card.addEventListener('click', () => {
        group.querySelectorAll('.radio-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        const radio = card.querySelector('input[type="radio"]');
        if (radio) radio.checked = true;
      });
    });
  });
</script>
</body>
</html>
