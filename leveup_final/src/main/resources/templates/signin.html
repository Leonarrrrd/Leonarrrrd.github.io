<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta charset="utf-8" />
  <title>Register</title>
  <link rel="stylesheet" href="/css/globals.css">
  <link rel="stylesheet" href="/css/styleguide.css">
  
  <style>re
   
    
       /* 隐藏浏览器（如 Edge/IE）自带的密码可见性切换（眼睛）图标 */
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear {
  display: none;
  width: 0;
  height: 0;
}

/* 隐藏基于 Webkit 的浏览器（部分 Chrome/Safari）自带的密码/自动填充图标 */
input::-webkit-credentials-auto-fill-button,
input::-webkit-contacts-auto-fill-button {
  visibility: hidden;
  display: none !important;
  pointer-events: none;
}
    /* 1. 全局盒子模型与基础设置 */
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      background-color: #ffffff;
      /* 统一提取重复的字体属性到顶层或表单元素 */
      font-family: var(--body-default-font-family, sans-serif);
      color: var(--color-neutral-n800, #333);
    }

    /* 2. 页面主容器 - 采用 Flex 垂直布局，适应所有屏幕高度 */
    .sign-in {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 32px; /* 给底部留出安全区 */
    }

    /* 3. 头部导航 */
    .header-variant {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      padding-top: env(safe-area-inset-top, 80px); /* 适配刘海屏 */

    }

    .action-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background-color: var(--color-neutral-n100, #f5f5f5);
      border-radius: 50%;
      text-decoration: none;
      margin-top: 44px;
    }

    .page-title {
      font-family: var(--title-screen-font-family);
      font-size: var(--title-screen-font-size, 24px);
      text-align: center;
      margin: 44px 0 32px 0;
    }

    /* 4. 表单与布局复用类 */
    form {
      display: flex;
      flex-direction: column;
      gap: 16px; /* 统一各输入框的间距 */
      flex: 1; /* 让表单撑开空间，把按钮推到底部 */
    }

    /* 统一的表单项组 (标签 + 输入框) */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }


    /* 统一标签样式 (替代原来的重复代码) */
    .form-label {
      font-size: var(--body-default-font-size, 14px);
      font-weight: var(--body-default-font-weight, 500);
    }

    /* 统一输入框外壳 */
    .input-wrapper {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background-color: var(--color-shade-white, #fff);
      border-radius: 8px;
      border: 1.5px solid var(--color-neutral-n200, #e0e0e0);
      transition: border-color 0.2s;
    }
    
    .input-wrapper:focus-within {
      border-color: var(--variable-collection-apple-blue, #007aff);
    }

    /* 统一输入框本体 (去除重复字体代码) */
    .form-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: var(--body-default-font-size, 14px);
      color: inherit;
      width: 100%;
    }

    .form-input::placeholder {
      color: var(--color-neutral-n400, #9e9e9e);
    }
    
    /* 隐藏数字输入框自带的上下箭头 */
    .form-input[type="number"]::-webkit-inner-spin-button,
    .form-input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* 密码可见性切换按钮 */
    .toggle-password {
      background: none;
      border: none;
      padding: 0;
      margin-left: 8px;
      cursor: pointer;
      display: flex;
    }

    .hint-text {
      font-size: 12px;
      color: var(--color-neutral-n500, #757575);
      margin-top: 4px;
    }

    /* 5. 提交按钮 - 采用常规流，不要用绝对定位 */
    .submit-button {
      background-color: var(--variable-collection-apple-blue, #007aff);
      color: #fff; /* 确保文字是白色 */
      border: none;
      border-radius: 999px; /* 胶囊状 */
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: auto; /* 距离上方表单的间距 */
      width: 100%;
    }
  </style>
</head>
<body>

<main class="sign-in">
  
  <!-- 头部返回导航 -->
  <header class="header-variant" aria-label="Navigation header">
    <a th:href="@{/}" class="action-icon" aria-label="Go back">
      <img src="/img/fi-arrow-left.svg" alt="Back arrow" width="20" height="20" />
    </a>
  </header>

  <!-- 页面标题 -->
  <h1 class="page-title">Login</h1>

  <!-- 登录表单: 增加了 th:action 和 POST 方法以修复安全问题 -->
  <form th:action="@{/signin}" method="post" novalidate>


   <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <div class="input-wrapper">
        <!-- 注意 id 和 name 都改成了 email，type="email" -->
        <input class="form-input" id="email" type="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
    </div>
    <!-- Password -->
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrapper">
        <input class="form-input" id="password" type="password" name="password" placeholder="*********" minlength="8" autocomplete="current-password" aria-describedby="password-hint" />
        <button type="button" class="toggle-password" aria-label="Toggle password visibility" data-target="password">
          <img src="/img/fi-eye-off.svg" alt="Hide password" width="20" height="20" />
        </button>
      </div>
      <span class="hint-text" id="password-hint">must contain 8 char.</span>
    </div>

    <!-- 添加这行：仅在有 error 属性时显示 -->
  <div th:if="${error}" style="color: #ff3b30; margin-bottom: 16px; text-align: center; font-size: 14px;">
    <p th:text="${error}"></p>
  </div>

    <!-- 提交按钮 -->
    <button class="submit-button" type="submit">
      Login
    </button>

    <p style="text-align:center; margin-top:8px; font-size:14px; color:#666;">
      Don't have an account? <a th:href="@{/signup}" style="color:#007aff; text-decoration:none;">Sign up</a>
    </p>
  </form>

</main>

<script>
  // 密码可见性切换逻辑 (保持不变，因为本身写得很好)
  document.querySelectorAll('.toggle-password').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var targetId = btn.getAttribute('data-target');
      var input = document.getElementById(targetId);
      if (input) {
        var isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        // 可选：在这里动态切换眼睛图标的 src (fi-eye.svg / fi-eye-off.svg)
      }
    });
  });
</script>
</body>
</html>
