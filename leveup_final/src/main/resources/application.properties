# 1. 数据库连接配置 (连接到我们刚刚创建的 levelup_db)
spring.datasource.url=jdbc:mysql://localhost:3306/levelup-db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
# 你的 MySQL 用户名 (通常是 root)
spring.datasource.username=root
# 你的 MySQL 密码 (改成你电脑上真实的数据库密码)
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate 配置
# 控制台打印出自动执行的 SQL 语句，方便你观察数据是怎么存进去的
spring.jpa.show-sql=true
# 这一句很重要！因为你已经手动用 SQL 语句建好表了，这里设为 none 或 update，防止 Spring Boot 删掉你的表
spring.jpa.hibernate.ddl-auto=update

# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# # 端口
# server.port=8080

# # Thymeleaf 缓存关闭（开发时）
# spring.thymeleaf.cache=false

# # 静态资源路径（默认已包含 /static、/public 等）
